name: GODLIKE Public Page Renew

on:
  schedule:
    # 每天北京时间9点运行一次
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      godlike_id:
        description: '指定 GODLIKE ID（留空则用 Secret 中的全部 ID）'
        required: false
        default: ''

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            ffmpeg \
            wget \
            gnupg2 \
            software-properties-common

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Cloudflare WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ bookworm main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          # 注册并连接 WARP（首次需要接受 TOS）
          sudo warp-cli --accept-tos registration new || true
          sudo warp-cli --accept-tos connect || true
          sleep 10
          echo "当前 IP:"
          curl -s https://api.ipify.org || true

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run renewal script
        id: renew
        env:
          GODLIKE_ID: ${{ github.event.inputs.godlike_id || secrets.GODLIKE_ID }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          echo "🎮 GODLIKE Public Page Renewal"
          echo "=============================="
          echo "Time: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S %Z')"
          echo ""
          python renew.py 2>&1 | tee output.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: output/screenshots/
          retention-days: 7
          if-no-files-found: ignore
