name: GODLIKE 视频续期

on:
  schedule:
    - cron: '0 0,20 * * *'  # 每20小时
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm pkg set type=module
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run video watcher
        id: watch
        env:
          GODLIKE_EMAIL: ${{ secrets.GODLIKE_EMAIL }}
          GODLIKE_PASSWORD: ${{ secrets.GODLIKE_PASSWORD }}
        run: node watch-video.js

      - name: Notify Telegram
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          MSG="${{ steps.watch.outputs.msg }}"
          if [ -z "$MSG" ]; then
            MSG="⚠️ GODLIKE 续期脚本异常退出"
          fi
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${TG_CHAT_ID}\",\"text\":\"${MSG}\",\"parse_mode\":\"HTML\"}"
          fi
