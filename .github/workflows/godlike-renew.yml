name: Auto Renew GODLIKE Server

on:
  schedule:
    - cron: '0 1 * * *'  # 每天北京时间9点
  workflow_dispatch: {}

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm pkg set type=module
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run renewal script
        id: renew
        env:
          GODLIKE_EMAIL: ${{ secrets.GODLIKE_EMAIL }}
          GODLIKE_PASSWORD: ${{ secrets.GODLIKE_PASSWORD }}
        run: node godlike-renew.js

      - name: Telegram notification
        if: always()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          MSG: ${{ steps.renew.outputs.msg }}
        run: |
          if [ -z "$MSG" ]; then MSG="⚠️ GODLIKE 续期脚本异常退出"; fi
          if [ -n "$TG_BOT_TOKEN" ] && [ -n "$TG_CHAT_ID" ]; then
            curl -s "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT_ID}" \
              --data-urlencode "text=${MSG}" \
              -d "parse_mode=HTML" || true
          fi