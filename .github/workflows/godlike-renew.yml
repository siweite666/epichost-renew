name: GODLIKE 视频续期

on:
  schedule:
    # 每4小时运行一次（服务器5小时过期，留1小时安全余量）
    - cron: '0 0,4,8,12,16,20 * * *'
  workflow_dispatch: # 手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm pkg set type=module
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run video watcher
        id: watch
        env:
          GODLIKE_COOKIE: ${{ secrets.GODLIKE_COOKIE }}
        run: node watch-video.js

      - name: Notify Telegram
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          MSG="${{ steps.watch.outputs.msg }}"
          if [ -z "$MSG" ]; then
            MSG="⚠️ GODLIKE 续期脚本异常退出"
          fi

          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${TG_CHAT_ID}\",\"text\":\"${MSG}\",\"parse_mode\":\"HTML\"}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print('📨 Telegram:', 'OK' if d.get('ok') else d.get('description','?'))"
          else
            echo "⚠️ Telegram not configured"
          fi
