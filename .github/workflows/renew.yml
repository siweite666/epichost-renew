name: Auto Renew EpicHost Server

on:
  schedule:
    # Every 4 hours (UTC 00:00, 04:00, 08:00, 12:00, 16:00, 20:00)
    - cron: '0 0,4,8,12,16,20 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Renew Server
        id: renew
        run: |
          echo "🎮 EpicHost Server Auto-Renew"
          echo "=============================="
          echo "Time: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S %Z')"
          echo ""

          SERVERS="${{ secrets.SERVER_UUIDS }}"
          if [ -z "$SERVERS" ]; then
            echo "⚠️ No SERVER_UUIDS configured, nothing to renew."
            echo "msg=⚠️ 未配置 SERVER_UUIDS" >> $GITHUB_OUTPUT
            exit 0
          fi

          TOTAL=0
          SUCCESS=0
          SKIPPED=0
          FAILED=0
          RESULTS=""

          IFS=',' read -ra UUIDS <<< "$SERVERS"
          for UUID in "${UUIDS[@]}"; do
            UUID=$(echo "$UUID" | xargs)
            [ -z "$UUID" ] && continue
            TOTAL=$((TOTAL + 1))

            echo ""
            echo "--- Server: $UUID ---"

            HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" -X POST \
              -H "Authorization: Bearer ${{ secrets.PTERODACTYL_TOKEN }}" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              "${{ secrets.PANEL_URL }}/api/client/freeservers/$UUID/renew")

            BODY=$(cat /tmp/response.json)

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "204" ]; then
              echo "✅ Renewal successful!"
              SUCCESS=$((SUCCESS + 1))
              RESULTS="${RESULTS}\n✅ ${UUID:0:8}... 续期成功"
            elif echo "$BODY" | grep -q "only once\|can't renew\|already"; then
              echo "⏳ Already renewed in this period, skipping."
              SKIPPED=$((SKIPPED + 1))
              RESULTS="${RESULTS}\n⏳ ${UUID:0:8}... 已续过，跳过"
            else
              echo "❌ Failed (HTTP $HTTP_CODE)"
              echo "$BODY" | head -20
              FAILED=$((FAILED + 1))
              RESULTS="${RESULTS}\n❌ ${UUID:0:8}... 失败 (HTTP $HTTP_CODE)"
            fi
          done

          echo ""
          echo "=============================="
          echo "📊 Summary: $TOTAL server(s) | ✅ $SUCCESS succeeded | ⏳ $SKIPPED skipped | ❌ $FAILED failed"

          # Build notification message
          TIME_CN=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')
          if [ "$SUCCESS" -gt 0 ]; then
            ICON="✅"
            STATUS="续期成功"
          elif [ "$SKIPPED" -gt 0 ] && [ "$FAILED" -eq 0 ]; then
            ICON="⏳"
            STATUS="已续过，跳过"
          else
            ICON="❌"
            STATUS="续期失败"
          fi

          MSG="${ICON} EpicHost 服务器续期报告\n"
          MSG="${MSG}━━━━━━━━━━━━━━━\n"
          MSG="${MSG}🕐 时间: ${TIME_CN}\n"
          MSG="${MSG}📊 结果: ${SUCCESS}成功 / ${SKIPPED}跳过 / ${FAILED}失败\n"
          MSG="${MSG}${RESULTS}"

          echo "msg<<EOF" >> $GITHUB_OUTPUT
          echo -e "$MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ "$FAILED" -gt 0 ]; then
            echo "status=fail" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "status=ok" >> $GITHUB_OUTPUT
          fi

      - name: Notify Telegram
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          MSG="${{ steps.renew.outputs.msg }}"
          if [ -z "$MSG" ]; then
            MSG="⚠️ 续期脚本异常退出"
          fi

          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${TG_CHAT_ID}\",\"text\":\"${MSG}\",\"parse_mode\":\"HTML\"}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print('📨 Telegram:', 'OK' if d.get('ok') else d.get('description','?'))"
          else
            echo "⚠️ Telegram not configured, skipping notification."
          fi
